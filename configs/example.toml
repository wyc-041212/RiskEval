[llm]
provider = "api" # "api" or "local"
# Optional per-role override; default to provider when omitted.
# solver_provider = "local"
# parser_provider = "api"
# judge_provider = "api"

[api]
api_key_env = "HKBUEDU_API_KEY"
base_url = "https://genai.hkbu.edu.hk/api/v0/rest"
api_version = "2024-12-01-preview"

[local]
device = "auto" # auto / mps / cuda / cpu
dtype = "auto"  # auto / float16 / bfloat16 / float32
trust_remote_code = false
local_files_only = true
# hf_token_env = "HUGGINGFACE_HUB_TOKEN"

[models]
solver_model = "gpt-4.1-mini"
parser_model = "gpt-4.1-mini"
judge_model = "gpt-4.1-mini"
temperature = 0.0
max_tokens = 1000

[sweep]
penalties = [0, 0.1, 0.3, 0.6, 1.0, 2.0, 5.0, 10.0]

[run]
data_path = "/Users/wuyuchen/Desktop/RiskEval/data/gpqa_diamond_test.jsonl"
out_dir = "/Users/wuyuchen/Desktop/RiskEval/output/gpqa_smoke"
prompt_strategy = 1
max_examples = 20
random_seed = 42
